{% extends "base.html" %}

{% block content %}
<div class="page-head">
    <div>
        <h1>Admin - Fleet</h1>
        <p>{{ fleet|length }} database records</p>
    </div>
    <a href="/admin" class="btn btn-outline-secondary btn-sm">Back</a>
</div>
<div class="table-scroll">
    <table class="table table-sm data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Vehicle</th>
                <th>Driver</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for vehicle in fleet %}
            <tr>
                <td class="muted">#{{ vehicle.id }}</td>
                <td>{{ vehicle.vehicle }}</td>
                <td>{{ vehicle.driver }}</td>
                <td><span class="status-pill">{{ vehicle.status }}</span></td>
                <td class="action-cell">
                    <a href="/admin/vehicle/{{ vehicle.id }}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="/admin/vehicle/delete/{{ vehicle.id }}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
