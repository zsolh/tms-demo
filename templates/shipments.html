{% extends "base.html" %}

{% block content %}
<h2>Shipment Management</h2>
<a href="/add_shipment" class="btn btn-primary mb-3">Add New Shipment</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Origin</th>
            <th>Destination</th>
            <th>Status</th>
            <th>Driver</th>
        </tr>
    </thead>
    <tbody>
        {% for shipment in shipments %}
        <tr>
            <td>{{ shipment.id }}</td>
            <td>{{ shipment.origin }}</td>
            <td>{{ shipment.destination }}</td>
            <td>{{ shipment.status }}</td>
            <td>{{ shipment.driver }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
